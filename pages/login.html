<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap — BYEM GYM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-brand">BYEM<span>GYM</span></a>
      <div class="navbar-actions">
        <a href="register.html" class="btn btn-primary btn-sm">Üye Ol</a>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card card">
      <div class="auth-header">
        <h2>Tekrar <span class="text-primary">Hoşgeldin</span></h2>
        <p>Hesabına giriş yap ve antrenmana devam et.</p>
      </div>

      <div class="alert" id="loginAlert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">E-posta</label>
          <input type="email" id="email" class="form-input" placeholder="ornek@email.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Şifre</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required />
            <button type="button" class="toggle-pw" tabindex="-1">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="loginBtn">
          Giriş Yap
        </button>
      </form>

      <div class="auth-footer">
        <p>Hesabın yok mu? <a href="register.html">Üye Ol</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  
  
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
